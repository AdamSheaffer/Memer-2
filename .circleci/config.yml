# Javascript Node CircleCI 2.0 configuration file
#
# Check https://circleci.com/docs/2.0/language-javascript/ for more details
#
version: 2
jobs:
  build-job:
    docker:
      # specify the version you desire here
      - image: circleci/node:latest

      # Specify service dependencies here if necessary
      # CircleCI maintains a library of pre-built images
      # documented at https://circleci.com/docs/2.0/circleci-images/
      # - image: circleci/mongo:3.4.4

    working_directory: ~/repo

    steps:
      - checkout

      # Download and cache dependencies
      - restore_cache:
          keys:
            - v1-dependencies-{{ checksum "client/package.json" }}
            # fallback to using the latest cache if no exact match is found
            - v1-dependencies-

      # Client
      - run: cd client && npm install
      - run: cd client && npm run build
      - run: cd client && npm run lint

      # Functions
      - run: cd functions && npm install
      - run: cd functions && npm run build
      - run: cd functions && npm run lint

      - save_cache:
          paths:
            - client/node_modules
            - client/dist
            - client/package.json
            - functions/node_modules
            - functions/lib
            - functions/package.json
            - firebase.json
            - .firebaserc
            - database.rules.json
            - firestore.rules
            - firestore.indexes.json
          key: v1-dist-{{ .Environment.CIRCLE_BRANCH }}-{{ .Environment.CIRCLE_SHA1 }}

  deploy-job:
    docker:
      - image: circleci/node:latest
    working_directory: ~/repo
    steps:
      - restore_cache:
          keys:
            - v1-dist-{{ .Environment.CIRCLE_BRANCH }}-{{ .Environment.CIRCLE_SHA1 }}
      - run:
          name: show directory
          command: pwd
      - run:
          name: Install Firebase
          command: cd client && npm install --save-dev firebase-tools
      - run:
          name: look in directory
          command: ls -ltr
      - run:
          name: Deploy Master to Firebase
          command: cd client && npm run deploy -- --token=$FIREBASE_DEPLOY_TOKEN

workflows:
  version: 2

  -deploy:
    jobs:
      - build-job
      - deploy-job:
          requires:
            - build-job
          filters:
            branches:
              only: master
